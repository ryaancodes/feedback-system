<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Feedback System</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<!-- ── Navbar ── -->
<nav class="navbar">
  <div class="navbar-brand">
    <span class="dot"></span>
    Feedback Dashboard
  </div>
  <div class="navbar-actions">
    <span class="navbar-user" id="adminUser">Loading…</span>
    <button class="btn btn-ghost" id="logoutBtn">
      Sign Out
    </button>
  </div>
</nav>

<!-- ── Main ── -->
<div class="page-wrapper">

  <!-- Stats -->
  <p class="sec-label">Overview</p>
  <div class="stats-grid">
    <div class="stat-card">
      <span class="stat-label">Total</span>
      <span class="stat-value" id="statTotal"></span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Avg</span>
      <span class="stat-value accent" id="statAvg"></span>
    </div>
    <div class="stat-card">
      <span class="stat-label">5★</span>
      <span class="stat-value teal" id="statFive"></span>
    </div>
    <div class="stat-card">
      <span class="stat-label">1★</span>
      <span class="stat-value" id="statOne"></span>
    </div>
  </div>

  <!-- Controls -->
  <p class="sec-label">All Feedback</p>

  <div class="controls">

    <!-- Search -->
    <div class="ctrl-wrap">
      <span class="ctrl-icon">🔍</span>
      <input 
        class="ctrl-input"
        type="text"
        id="searchInput"
        placeholder="Search by name or email…"
      >
    </div>

    <!-- Filter -->
    <select class="ctrl-select" id="filterRating">
      <option value="">All</option>
      <option value="5">★★★★★</option>
      <option value="4">★★★★☆</option>
      <option value="3">★★★☆☆</option>
      <option value="2">★★☆☆☆</option>
      <option value="1">★☆☆☆☆</option>
    </select>

    <!-- Sort -->
    <select class="ctrl-select" id="sortOrder">
      <option value="latest">Latest</option>
      <option value="oldest">Oldest</option>
      <option value="highest">Highest</option>
      <option value="lowest">Lowest</option>
    </select>

    <!-- Clear -->
    <button class="btn btn-ghost" id="clearBtn">Clear</button>

  </div>

  <!-- Table -->
  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Email</th>
          <th>Rating</th>
          <th>Comments</th>
          <th>Date</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="tblBody">
        <tr>
          <td colspan="7">
            <div class="empty">
              <span class="spin"></span>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>

<script src="/js/dashboard.js"></script>
</body>
</html>
