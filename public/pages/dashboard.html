<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Feedback System</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- ── Navbar ─────────────────────────────────────────────── -->
<nav class="navbar">
  <div class="navbar-brand">
    <span class="dot"></span>
    Feedback Dashboard
  </div>
  <div class="navbar-actions">
    <span class="navbar-user" id="adminUser">Loading…</span>
    <button class="btn btn-ghost" id="logoutBtn"
            style="padding:8px 18px; font-size:0.82rem;">
      Sign Out
    </button>
  </div>
</nav>

<!-- ── Main ───────────────────────────────────────────────── -->
<div class="page-wrapper">

  <!-- Stats Row -->
  <p class="sec-label" style="margin-bottom:16px;">Overview</p>
  <div class="stats-grid">
    <div class="stat-card">
      <span class="stat-icon">📋</span>
      <span class="stat-label">Total Submissions</span>
      <span class="stat-value" id="statTotal"><span class="spin"></span></span>
    </div>
    <div class="stat-card">
      <span class="stat-icon">⭐</span>
      <span class="stat-label">Average Rating</span>
      <span class="stat-value accent" id="statAvg">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-icon">🏆</span>
      <span class="stat-label">5-Star Reviews</span>
      <span class="stat-value teal" id="statFive">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-icon">⚡</span>
      <span class="stat-label">1-Star Reviews</span>
      <span class="stat-value" id="statOne">—</span>
    </div>
  </div>

  <!-- Controls + Table -->
  <p class="sec-label">All Feedback</p>
  <div class="controls">
    <div class="ctrl-wrap" style="flex:1; min-width:220px;">
      <span class="ctrl-icon">🔍</span>
      <input class="ctrl-input" type="text" id="searchInput"
             placeholder="Search by name or email…"
             style="width:100%">
    </div>

    <select class="ctrl-select" id="filterRating">
      <option value="">All Ratings</option>
      <option value="5">★★★★★  5 Stars</option>
      <option value="4">★★★★☆  4 Stars</option>
      <option value="3">★★★☆☆  3 Stars</option>
      <option value="2">★★☆☆☆  2 Stars</option>
      <option value="1">★☆☆☆☆  1 Star</option>
    </select>

    <select class="ctrl-select" id="sortOrder">
      <option value="latest">↓ Latest First</option>
      <option value="oldest">↑ Oldest First</option>
      <option value="highest">▲ Highest Rating</option>
      <option value="lowest">▼ Lowest Rating</option>
    </select>

    <button class="btn btn-ghost" id="clearBtn"
            style="padding:10px 16px; font-size:0.84rem;">
      Clear ✕
    </button>
  </div>

  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Email</th>
          <th>Rating</th>
          <th>Comments</th>
          <th>Date</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="tblBody">
        <tr><td colspan="7">
          <div class="empty"><span class="spin"></span></div>
        </td></tr>
      </tbody>
    </table>
  </div>
  <p class="row-count" id="rowCount"></p>

</div>

<!-- Delete Confirm Overlay -->
<div class="overlay" id="deleteOverlay">
  <div class="confirm-card">
    <div class="warn-icon">🗑</div>
    <h3>Delete this feedback?</h3>
    <p>This action cannot be undone.</p>
    <div class="confirm-btns">
      <button class="btn btn-ghost" id="cancelDelete">Cancel</button>
      <button class="btn btn-primary" id="confirmDelete"
              style="background:var(--danger); color:#fff;">
        Delete
      </button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script src="/js/dashboard.js"></script>
</body>
</html>
