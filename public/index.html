<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Feedback</title>

  <link rel="stylesheet" href="/css/style.css">

  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #f1f5f9;
      font-family: 'Inter', sans-serif;
    }

    .page-hero {
      text-align: center;
      padding: 50px 20px 20px;
    }

    .page-wrapper {
      padding: 20px;
    }

    .card {
      max-width: 600px;
      margin: auto;
      padding: 30px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 20px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .input-wrap {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 10px;
    }

    input, textarea {
      width: 100%;
      background: transparent;
      border: none;
      color: white;
      outline: none;
    }

    .star-wrap {
      display: flex;
      flex-direction: row-reverse;
    }

    .star-wrap input { display: none; }

    .star-wrap label {
      font-size: 28px;
      color: #334155;
      cursor: pointer;
    }

    .star-wrap input:checked ~ label,
    .star-wrap label:hover,
    .star-wrap label:hover ~ label {
      color: #facc15;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(90deg, #6366f1, #22c55e);
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="page-hero">
  <h1>Submit Feedback</h1>
</div>

<div class="page-wrapper">
  <div class="card">

    <form id="feedbackForm">

      <!-- NAME -->
      <div class="form-group" id="grp-name">
        <label>Name</label>
        <div class="input-wrap">
          <input type="text" id="name" placeholder="Your name">
        </div>
      </div>

      <!-- EMAIL -->
      <div class="form-group" id="grp-email">
        <label>Email</label>
        <div class="input-wrap">
          <input type="email" id="email" placeholder="Your email">
        </div>
      </div>

      <!-- RATING -->
      <div class="form-group" id="grp-rating">
        <label>Rating</label>
        <div class="star-wrap">
          <input type="radio" name="rating" id="s5" value="5"><label for="s5">★</label>
          <input type="radio" name="rating" id="s4" value="4"><label for="s4">★</label>
          <input type="radio" name="rating" id="s3" value="3"><label for="s3">★</label>
          <input type="radio" name="rating" id="s2" value="2"><label for="s2">★</label>
          <input type="radio" name="rating" id="s1" value="1"><label for="s1">★</label>
        </div>
      </div>

      <!-- COMMENTS -->
      <div class="form-group" id="grp-comments">
        <label>Comments</label>
        <div class="input-wrap">
          <textarea id="comments" maxlength="500" placeholder="Write feedback..."></textarea>
        </div>
      </div>

      <!-- BUTTON -->
      <button type="submit" id="submitBtn" class="btn">
        Submit Feedback
      </button>

    </form>

    <div style="text-align:center; margin-top:15px;">
      <a href="/admin">Go to Dashboard →</a>
    </div>

  </div>
</div>

<script src="/js/feedback-form.js"></script>

</body>
</html>
